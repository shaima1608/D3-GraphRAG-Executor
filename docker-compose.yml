services:
  mongo:
    image: mongo:7
    container_name: d2_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: d2_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5.26-community
    container_name: d2_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data

  api:
    build: .
    container_name: d2_fastapi
    depends_on:
      - mongo
      - qdrant
      - neo4j
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ./reports:/app/reports

volumes:
  mongo_data:
  qdrant_data:
  neo4j_data:
